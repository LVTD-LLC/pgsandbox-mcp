name: Deploy site

on:
  push:
    branches:
      - main
    paths:
      - 'CHANGELOG.md'
      - 'site/**'
      - 'scripts/check-site-changelog.mjs'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install site dependencies
        working-directory: site
        run: npm ci --include=dev
      - name: Check site changelog fallback
        run: node scripts/check-site-changelog.mjs
      - name: Build site
        working-directory: site
        env:
          ROWSET_API_KEY: ${{ secrets.ROWSET_API_KEY }}
          PGSANDBOX_BLOG_ROWSET_DATASET_KEY: 1e629b1a-89e5-4c56-8772-5c6ae5784753
          PGSANDBOX_BLOG_ROWSET_API_BASE: https://rowset.lvtd.dev/api
        run: |
          test -n "$ROWSET_API_KEY"
          npm run build
      - name: Package site for CapRover
        working-directory: site
        run: tar --exclude=node_modules -czf /tmp/pgsandbox-mcp-site.tar.gz .
      - name: Deploy to CapRover
        env:
          CAPROVER_URL: ${{ secrets.CAPROVER_PGSANDBOX_SITE_URL }}
          CAPROVER_APP: ${{ secrets.CAPROVER_PGSANDBOX_SITE_APP }}
          CAPROVER_APP_TOKEN: ${{ secrets.CAPROVER_PGSANDBOX_SITE_TOKEN }}
        run: |
          npm install -g caprover
          caprover deploy \
            --caproverUrl "$CAPROVER_URL" \
            --caproverApp "$CAPROVER_APP" \
            --appToken "$CAPROVER_APP_TOKEN" \
            --tarFile /tmp/pgsandbox-mcp-site.tar.gz
